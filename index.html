<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Đo Gỗ</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont;
margin:0;
background:#f2f4f7;
text-align:center;
}

.screen{display:none;padding:12px}
.active{display:block}

button{
padding:12px;
border-radius:12px;
border:none;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
font-size:16px;
}

.grid{
display:grid;
gap:8px;
margin:10px;
}

.selected{
background:#2e7d32;
color:white;
}

.disabled{
opacity:0.35;
pointer-events:none;
}

#toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#e8f5e9;
color:#1b5e20;
padding:10px 16px;
border-radius:12px;
display:none;
}

.list{
max-height:120px;
overflow:auto;
text-align:left;
}

.matrix{
overflow:auto;
}

.matrix table{
border-collapse:collapse;
margin:auto;
}

.matrix td,.matrix th{
border:1px solid #ccc;
width:42px;
height:42px;
text-align:center;
}

.headerBar{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div id="toast"></div>

<!-- SETUP -->

<div id="setup" class="screen active">

<h2>Cấu hình</h2>

Mã kiện<br>
<input id="bundle" value="A001"><br><br>

Độ dày (cm)<br>
<input id="thickness" value="3"><br><br>

Khoảng chiều dài (dm)<br>
<input id="lenMin" value="20"> -
<input id="lenMax" value="40"><br><br>

Khoảng chiều rộng (cm)<br>
<input id="widMin" value="8"> -
<input id="widMax" value="30"><br><br>

Số nút mỗi hàng<br>

<button onclick="gridMinus()">-</button>
<span id="gridCount">6</span>
<button onclick="gridPlus()">+</button>

<br><br>

<button onclick="startMeasure()">Bắt đầu đo</button>

</div>

<!-- NHẬP LIỆU -->

<div id="measure" class="screen">

<div class="headerBar">
<button onclick="showSetup()">← Quay lại</button>
<button onclick="resetBoards()">Reset</button>
<button onclick="undoBoard()">Undo</button>
</div>

<h3 id="header"></h3>

<div>
<span id="pcs">0 tấm</span> •
<span id="vol">0.000 m³</span>
<button onclick="showMatrix()">Ma trận</button>
</div>

<h3>Dài (dm)</h3>
<div id="lengthGrid" class="grid"></div>

<h3>Rộng (cm)</h3>
<div id="widthGrid" class="grid disabled"></div>

<h3>Tấm vừa nhập</h3>
<div id="boardList" class="list"></div>

</div>

<!-- MATRIX -->

<div id="matrix" class="screen">

<button onclick="showMeasure()">← Quay lại</button>

<h3 id="matrixHeader"></h3>

<div class="matrix" id="matrixContainer"></div>

<br>

<button onclick="exportImage()">Xuất ảnh ma trận</button>

</div>

<script>

let boards=[]
let grid=6
let selectedLength=null

function showToast(text){
let t=document.getElementById("toast")
t.innerText=text
t.style.display="block"
setTimeout(()=>t.style.display="none",500)
}

function gridMinus(){if(grid>5)grid--;gridCount.innerText=grid}
function gridPlus(){if(grid<7)grid++;gridCount.innerText=grid}

function startMeasure(){

setup.classList.remove("active")
measure.classList.add("active")

header.innerText=
bundle.value+" • "+thickness.value+"cm"

createButtons()

}

function showSetup(){
measure.classList.remove("active")
setup.classList.add("active")
}

function resetBoards(){
boards=[]
updateSummary()
renderList()
}

function undoBoard(){
boards.pop()
updateSummary()
renderList()
}

function createButtons(){

let lenMinV=Number(lenMin.value)
let lenMaxV=Number(lenMax.value)

let widMinV=Number(widMin.value)
let widMaxV=Number(widMax.value)

lengthGrid.innerHTML=""
widthGrid.innerHTML=""

lengthGrid.style.gridTemplateColumns="repeat("+grid+",1fr)"
widthGrid.style.gridTemplateColumns="repeat("+grid+",1fr)"

for(let i=lenMinV;i<=lenMaxV;i++){

let b=document.createElement("button")
b.innerText=i

b.onclick=()=>{

selectedLength=i

document.querySelectorAll("#lengthGrid button")
.forEach(x=>x.classList.remove("selected"))

b.classList.add("selected")

widthGrid.classList.remove("disabled")

}

lengthGrid.appendChild(b)

}

for(let i=widMinV;i<=widMaxV;i++){

let b=document.createElement("button")
b.innerText=i

b.onclick=()=>{

if(selectedLength==null)return

boards.push({l:selectedLength,w:i})

showToast("Đã thêm "+selectedLength+" x "+i)

selectedLength=null

document.querySelectorAll("#lengthGrid button")
.forEach(x=>x.classList.remove("selected"))

widthGrid.classList.add("disabled")

updateSummary()
renderList()

}

widthGrid.appendChild(b)

}

}

function updateSummary(){

pcs.innerText=boards.length+" tấm"

let v=0

boards.forEach(b=>{
v+=(b.l/10)*(b.w/100)*(thickness.value/100)
})

vol.innerText=v.toFixed(3)+" m³"

}

function renderList(){

boardList.innerHTML=""

boards.slice(-10).reverse().forEach((b,i)=>{

let div=document.createElement("div")

div.innerHTML=b.l+" x "+b.w+
" <button onclick='deleteBoard("+i+")'>X</button>"

boardList.appendChild(div)

})

}

function deleteBoard(i){
boards.splice(boards.length-1-i,1)
updateSummary()
renderList()
}

function showMatrix(){

measure.classList.remove("active")
matrix.classList.add("active")

matrixHeader.innerText=
bundle.value+" • "+
boards.length+" tấm • "+
vol.innerText

renderMatrix()

}

function showMeasure(){

matrix.classList.remove("active")
measure.classList.add("active")

}

function renderMatrix(){

let map={}

boards.forEach(b=>{
let key=b.w+"_"+b.l
map[key]=(map[key]||0)+1
})

let widths=[...new Set(boards.map(b=>b.w))].sort((a,b)=>a-b)
let lengths=[...new Set(boards.map(b=>b.l))].sort((a,b)=>a-b)

let html="<table><tr><th>Rộng\\Dài</th>"

lengths.forEach(l=>html+="<th>"+l+"</th>")

html+="</tr>"

widths.forEach(w=>{

html+="<tr><th>"+w+"</th>"

lengths.forEach(l=>{

let v=map[w+"_"+l]||0

let color=
v==0?"white":
v==1?"#c8e6c9":
v==2?"#81c784":
"#388e3c"

html+="<td style='background:"+color+"'>"+v+"</td>"

})

html+="</tr>"

})

html+="</table>"

matrixContainer.innerHTML=html

}

function exportImage(){

let canvas=document.createElement("canvas")

canvas.width=1000
canvas.height=700

let ctx=canvas.getContext("2d")

ctx.fillStyle="white"
ctx.fillRect(0,0,1000,700)

ctx.fillStyle="black"
ctx.font="18px Arial"

ctx.fillText("Mã kiện: "+bundle.value,20,40)
ctx.fillText("Độ dày: "+thickness.value+"cm",20,70)
ctx.fillText("Số tấm: "+boards.length,20,100)

boards.forEach((b,i)=>{
ctx.fillText(b.l+" x "+b.w,20,150+i*20)
})

let link=document.createElement("a")

link.download="matrix.png"
link.href=canvas.toDataURL()

link.click()

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Wood Measure</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f7fb;
text-align:center;
}

.screen{
display:none;
padding:10px;
}

.active{
display:block;
}

button{
padding:12px;
border-radius:10px;
border:none;
background:white;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
font-size:16px;
}

.grid{
display:grid;
gap:8px;
margin:10px;
}

.selected{
background:#4CAF50;
color:white;
}

.disabled{
opacity:0.4;
pointer-events:none;
}

#toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#e8f5e9;
color:#2e7d32;
padding:10px 18px;
border-radius:10px;
display:none;
}

.list{
max-height:120px;
overflow:auto;
}

.matrixRow{
display:flex;
}

.matrixCell{
width:42px;
height:42px;
border:1px solid #ccc;
display:flex;
align-items:center;
justify-content:center;
}

</style>
</head>

<body>

<div id="toast"></div>

<!-- SETUP -->

<div id="setup" class="screen active">

<h2>Setup</h2>

Bundle ID<br>
<input id="bundle" value="A001"><br><br>

Thickness (cm)<br>
<input id="thickness" value="3"><br><br>

Length range<br>
<input id="lenMin" value="20"> -
<input id="lenMax" value="35"><br><br>

Width range<br>
<input id="widMin" value="15"> -
<input id="widMax" value="30"><br><br>

Buttons per row<br>

<button onclick="gridMinus()">-</button>
<span id="gridCount">6</span>
<button onclick="gridPlus()">+</button>

<br><br>

<button onclick="startMeasure()">Start Measurement</button>

</div>


<!-- MEASURE -->

<div id="measure" class="screen">

<button onclick="showSetup()">Back</button>
<button onclick="resetBoards()">Reset</button>

<h3 id="header"></h3>

<div>
<span id="pcs">0 pcs</span> •
<span id="vol">0.000 m3</span>
<button onclick="showMatrix()">Matrix</button>
</div>

<h3>Length (dm)</h3>
<div id="lengthGrid" class="grid"></div>

<h3>Width (cm)</h3>
<div id="widthGrid" class="grid disabled"></div>

<h3>Recent Boards</h3>

<div id="boardList" class="list"></div>

</div>


<!-- MATRIX -->

<div id="matrix" class="screen">

<button onclick="showMeasure()">Back</button>

<h3 id="matrixHeader"></h3>

<div id="matrixContainer"></div>

<br>

<button onclick="exportImage()">Export Image</button>

</div>

<script>

let boards=[]
let grid=6
let selectedLength=null

function showToast(t){
let toast=document.getElementById("toast")
toast.innerText=t
toast.style.display="block"
setTimeout(()=>toast.style.display="none",500)
}

function gridMinus(){
if(grid>5)grid--
gridCount.innerText=grid
}

function gridPlus(){
if(grid<7)grid++
gridCount.innerText=grid
}

function startMeasure(){

setup.classList.remove("active")
measure.classList.add("active")

header.innerText=bundle.value+" • "+thickness.value+"cm"

createButtons()

}

function showSetup(){
measure.classList.remove("active")
setup.classList.add("active")
}

function resetBoards(){
boards=[]
updateSummary()
renderList()
}

function createButtons(){

let lenMin=Number(lenMin.value)
let lenMax=Number(lenMax.value)
let widMin=Number(widMin.value)
let widMax=Number(widMax.value)

lengthGrid.innerHTML=""
widthGrid.innerHTML=""

lengthGrid.style.gridTemplateColumns="repeat("+grid+",1fr)"
widthGrid.style.gridTemplateColumns="repeat("+grid+",1fr)"

for(let i=lenMin;i<=lenMax;i++){

let b=document.createElement("button")
b.innerText=i

b.onclick=()=>{

selectedLength=i

document.querySelectorAll("#lengthGrid button")
.forEach(x=>x.classList.remove("selected"))

b.classList.add("selected")

widthGrid.classList.remove("disabled")

}

lengthGrid.appendChild(b)

}

for(let i=widMin;i<=widMax;i++){

let b=document.createElement("button")
b.innerText=i

b.onclick=()=>{

if(selectedLength==null)return

boards.push({l:selectedLength,w:i})

showToast("Đã thêm "+selectedLength+" x "+i)

selectedLength=null

document.querySelectorAll("#lengthGrid button")
.forEach(x=>x.classList.remove("selected"))

widthGrid.classList.add("disabled")

updateSummary()
renderList()

}

widthGrid.appendChild(b)

}

}

function updateSummary(){

pcs.innerText=boards.length+" pcs"

let vol=0
boards.forEach(b=>{
vol+=(b.l/10)*(b.w/100)*(thickness.value/100)
})

vol=vol.toFixed(3)

document.getElementById("vol").innerText=vol+" m3"

}

function renderList(){

boardList.innerHTML=""

boards.slice(-10).reverse().forEach((b,i)=>{

let div=document.createElement("div")
div.innerText=b.l+" x "+b.w

boardList.appendChild(div)

})

}

function showMatrix(){

measure.classList.remove("active")
matrix.classList.add("active")

matrixHeader.innerText=
bundle.value+" • "+thickness.value+"cm • "+boards.length+" pcs"

renderMatrix()

}

function showMeasure(){

matrix.classList.remove("active")
measure.classList.add("active")

}

function renderMatrix(){

matrixContainer.innerHTML=""

let map={}

boards.forEach(b=>{
let k=b.w+"_"+b.l
map[k]=(map[k]||0)+1
})

let widths=[...new Set(boards.map(b=>b.w))].sort((a,b)=>a-b)
let lengths=[...new Set(boards.map(b=>b.l))].sort((a,b)=>a-b)

widths.forEach(w=>{

let row=document.createElement("div")
row.className="matrixRow"

lengths.forEach(l=>{

let cell=document.createElement("div")
cell.className="matrixCell"

let v=map[w+"_"+l]||0

cell.innerText=v

cell.style.background=
v==0?"white":
v==1?"#c8e6c9":
v==2?"#81c784":
"#388e3c"

row.appendChild(cell)

})

matrixContainer.appendChild(row)

})

}

function exportImage(){

let canvas=document.createElement("canvas")
canvas.width=900
canvas.height=600

let ctx=canvas.getContext("2d")

ctx.fillStyle="white"
ctx.fillRect(0,0,900,600)

ctx.fillStyle="black"
ctx.font="16px Arial"

ctx.fillText("Bundle "+bundle.value,20,30)

boards.forEach((b,i)=>{
ctx.fillText(b.l+"x"+b.w,20,60+i*20)
})

let link=document.createElement("a")
link.download="matrix.png"
link.href=canvas.toDataURL()
link.click()

}

</script>

</body>
</html>
